<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Calculus - Blood Taint Calculator</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-toggle-icon">☀</span>
    <span class="theme-toggle-label">Light</span>
  </button>
  <div class="title-eyebrow">Vigesimal Arithmetic Engine</div>
  <h1>BLOOD TAINT CALCULATOR</h1>
  <div class="subtitle">BASE&nbsp;20&nbsp;·&nbsp;CONVERSION&nbsp;&amp;&nbsp;AVERAGING</div>
</header>

<main>

  <a href="index.html" class="back-btn">← Back</a>

  <div class="card">
    <div class="card-header">
      <span class="card-num">II</span>
      <span class="card-title">Ancestral Average</span>
    </div>
    <div class="card-body">
      <div class="options-row">
        <div class="field-col">
          <label>Decimal Places</label>
          <select id="avgDp">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>            
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>            
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15" selected>15</option>
          </select>
        </div>
        <div class="field-col">
          <label>Base-20 Input Format</label>
          <select id="avgNotation">
            <option value="compact">Compact (2D8)</option>
            <option value="csv">CSV (2,13,8)</option>
          </select>
        </div>
      </div>

      <div class="trio-grid">
        <div class="field-col">
          <div class="parent-label">MOTHER</div>
          <input type="text" id="motherIn" placeholder="e.g. 2D8" autocomplete="off" spellcheck="false">
          <div class="hint" id="motherHint"></div>
        </div>
        <div class="trio-eq">+</div>
        <div class="field-col">
          <div class="parent-label">FATHER</div>
          <input type="text" id="fatherIn" placeholder="e.g. 1J4" autocomplete="off" spellcheck="false">
          <div class="hint" id="fatherHint"></div>
        </div>
        <div class="trio-eq">÷2&nbsp;=</div>
        <div class="field-col">
          <div class="parent-label child-label">CHILD</div>
          <div class="result-box" style="padding:10px 12px; min-height:48px;">
            <div class="result-value" id="childInline" style="font-size:22px;">-</div>
          </div>
        </div>
      </div>

      <hr class="section-divider">

      <div class="result-grid">
        <div class="result-box">
          <div class="result-label">Child - Compact</div>
          <div class="result-value" id="childCompact">-</div>
        </div>
        <div class="result-box">
          <div class="result-label">Child - CSV</div>
          <div class="result-value" id="childCsv">-</div>
        </div>
      </div>
      <div style="margin-top:12px;">
        <div class="result-box">
          <div class="result-label">Child – Base 10</div>
          <div class="result-value" id="childDec">-</div>
        </div>
      </div>
      <div style="margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="result-box">
          <div class="result-label">Mother – Base 10</div>
          <div class="result-value" style="font-size:18px;" id="motherDec10">-</div>
        </div>
        <div class="result-box">
          <div class="result-label">Father – Base 10</div>
          <div class="result-value" style="font-size:18px;" id="fatherDec10">—</div>
        </div>
      </div>
    </div>
  </div>

</main>

<footer>BLOOD TAINT CALCULATOR &nbsp;·&nbsp; VIGESIMAL ENGINE &nbsp;·&nbsp; BASE&nbsp;20</footer>

<script src="assets/script.js" defer></script>
</body>
</html>
